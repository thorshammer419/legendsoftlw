name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Install .NET native dependencies
        run: sudo apt-get install -y libicu70 libssl3 libgssapi-krb5-2

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy (with ldd diagnostic on failure)
        run: |
          BINARY_DIR="$HOME/.swa/deploy"
          swa deploy web/build --deployment-token "$AZURE_STATIC_WEB_APPS_API_TOKEN" --env production || {
            echo "=== Deploy failed — running ldd diagnostic ==="
            BINARY=$(find "$BINARY_DIR" -name "StaticSitesClient" 2>/dev/null | head -1)
            if [ -n "$BINARY" ]; then
              ldd "$BINARY" || true
            else
              echo "Binary not found in $BINARY_DIR"
              ls -la "$BINARY_DIR" 2>/dev/null || echo "Directory does not exist"
            fi
            exit 1
          }
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
