name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Deploy to Azure Static Web Apps
        run: |
          # Fetch binary URL from Azure's release metadata
          METADATA=$(curl -sL "https://aka.ms/swalocaldeploy")
          BINARY_URL=$(echo "$METADATA" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          latest = next(d for d in data if d['version'] == 'latest')
          print(latest['files']['linux-x64']['url'])
          ")

          echo "Downloading StaticSitesClient from $BINARY_URL"
          curl -sL "$BINARY_URL" -o StaticSitesClient
          chmod +x StaticSitesClient

          TOKEN=$(echo "$AZURE_STATIC_WEB_APPS_API_TOKEN" | tr -d '[:space:]')

          ./StaticSitesClient upload \
            --apiToken "$TOKEN" \
            --app "web" \
            --outputLocation "build" \
            --configFileLocation "web/build" \
            --skipAppBuild \
            --deploymentProvider "SwaCli"
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
