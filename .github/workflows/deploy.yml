name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy (verbose diagnostic)
        run: |
          # Run deploy, capture failure
          SWA_CLI_DEBUG="*" swa deploy web/build \
            --deployment-token "$AZURE_STATIC_WEB_APPS_API_TOKEN" \
            --env production || FAILED=1

          # Find and inspect the binary
          BINARY=$(find "$HOME/.swa" -name "StaticSitesClient" 2>/dev/null | head -1)
          if [ -n "$BINARY" ]; then
            echo "=== Binary info ==="
            file "$BINARY"
            echo "=== Running binary directly ==="
            "$BINARY" 2>&1 || echo "Binary exit code: $?"
          fi

          [ "${FAILED:-0}" = "1" ] && exit 1 || true
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
